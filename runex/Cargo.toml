[package]
name = "runex"
version = "0.1.2"
edition = "2021"
description = "Cross-shell abbreviation engine that expands short tokens into full commands"
license = "MIT"
repository = "https://github.com/ShortArrow/runex"
keywords = ["shell", "abbreviation", "alias", "expansion", "cli"]
categories = ["command-line-utilities"]
readme = "README.md"

[[bin]]
name = "runex"
path = "src/main.rs"

[dependencies]
runex-core = { version = "0.1.2", path = "../runex-core" }
clap = { version = "4", features = ["derive"] }
which = "7"

[dev-dependencies]
tempfile = "3"
base64 = "0.22"

[target.'cfg(target_family = "unix")'.dev-dependencies]
rexpect = "0.5"
