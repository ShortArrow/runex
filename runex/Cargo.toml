[package]
name = "runex"
version = "0.1.6"
edition = "2024"
build = "build.rs"
description = "Cross-shell abbreviation engine that expands short tokens into full commands"
license = "MIT"
repository = "https://github.com/ShortArrow/runex"
keywords = ["shell", "abbreviation", "alias", "expansion", "cli"]
categories = ["command-line-utilities"]
# crates.io README is intentionally minimal; canonical docs live in ../README.md
readme = "README.md"

[[bin]]
name = "runex"
path = "src/main.rs"

[dependencies]
runex-core = { version = "0.1.6", path = "../runex-core" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
which = "7"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
base64 = "0.22"
